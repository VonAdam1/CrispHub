    <style>
        body { background-color: #030508; color: #ffffff; margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden; font-family: 'Outfit', sans-serif;}
        .glass-panel {
            background: linear-gradient(145deg, rgba(20, 25, 35, 0.4) 0%, rgba(10, 12, 18, 0.6) 100%);
            backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        
        .tool-paid {
            border: 1px solid rgba(59, 130, 246, 0.6) !important;

            background: linear-gradient(145deg, rgba(20, 35, 60, 0.5) 0%, rgba(10, 12, 18, 0.8) 100%);

            filter: grayscale(70%);
        }
        .tool-free:hover {
            opacity: 0.9;
            filter: grayscale(20%);
        }
        
        .space-nebula {
            position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
            width: 100vw; height: 100vh; background: radial-gradient(ellipse at center, rgba(30, 60, 120, 0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: -2; pointer-events: none;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px;}
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        
        .editable-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; padding: 6px 10px; border-radius: 6px; width: 100%; transition: all 0.2s; font-family: inherit; font-size: 13px;}
        .editable-input:focus { border-color: rgba(59, 130, 246, 0.8); outline: none; background: rgba(255,255,255,0.1); box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
        
        .tree-input { background: transparent; border: 1px solid transparent; color: white; border-radius: 4px; width: 100%; transition: all 0.2s; font-family: inherit; padding: 2px 4px; cursor: text; }
        .tree-input:hover:not(:focus) { background: rgba(255,255,255,0.05); }
        .tree-input:focus { border-color: rgba(59, 130, 246, 0.8); outline: none; background: rgba(0,0,0,0.6); box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
        
        .dragging { opacity: 0.4; border: 2px dashed #3b82f6 !important; }
        .drag-over { border: 2px solid #10b981 !important; transform: scale(1.02); }
        .column-enter { opacity: 0; transform: translateX(20px); animation: columnEnter 0.3s forwards; }
        @keyframes columnEnter { to { opacity: 1; transform: translateX(0); } }
    </style>
</head>

            toolResults: {

                ]},

                ]},

                ]},
                "enklare-klippning": { title: "Enklare klippning", tools: [

                    { id: "t_15", name: "Photoshop Online", desc: "Photopea", url: "https://www.photopea.com/", isFree: true, hidden: false, clicks: 0 }
                ]},
                "text-sprak-struktur": { title: "AI: Text & Språk", tools: [
                    { id: "t_16", name: "Google Gemini", desc: "Primär tjänst (Crisp).", url: "https://gemini.google.com", isFree: false, hidden: false, clicks: 0 }
                ]},
                "konceptbilder-storyboard": { title: "AI: Bildgenerering", tools: [
                    { id: "t_17", name: "Magnific AI", desc: "Konceptbilder.", url: "https://magnific.ai", isFree: false, hidden: false, clicks: 0 },
                    { id: "t_18", name: "Google Flow", desc: "Nano Banano 2", url: "https://labs.google/fx/tools/flow", isFree: true, hidden: false, clicks: 0 }
                ]},
                "video-image": { title: "AI: Video & Image", tools: [
                    { id: "t_19", name: "Google Veo", desc: "Video-generering.", url: "https://labs.google/fx/tools/flow", isFree: true, hidden: false, clicks: 0 }
                ]},
                "voice-sound": { title: "AI: Röst & Ljud", tools: [
                    { id: "t_20", name: "ElevenLabs", desc: "Röst och VO.", url: "https://elevenlabs.io", isFree: true, hidden: false, clicks: 0 }
                ]},
                "skicka-externt-till-kund": { title: "Extern Filöverföring", tools: [
                    { id: "t_21", name: "WeTransfer", desc: "Crisp Portal.", url: "https://crispfilm.wetransfer.com", isFree: false, hidden: false, clicks: 0 }
                ]},
                "ladda-upp-ner-internt-crisp-server": { title: "Intern Serverlagring", tools: [
                    { id: "t_22", name: "Crisp Server", desc: "Kräver lokalt nätverk.", url: "http://crispstorage02.quickconnect.to/", isFree: true, hidden: false, clicks: 0 },
                    { id: "t_23", name: "Filebrowser", desc: "Beta-lösning.", url: "https://filebrowser.crispfilm.se", isFree: true, hidden: false, clicks: 0 }
                ]},
                "hitta-ett-losenord": { title: "Lösenordshantering", tools: [
                    { id: "t_24", name: "Bitwarden", desc: "Får ej delas i klartext.", url: "https://bitwarden.com", isFree: false, hidden: false, clicks: 0 }
                ]},
                "kurser-utbildning": { title: "Utbildning", tools: [
                    { id: "t_25", name: "Masterclass", desc: "Kurser", url: "https://www.masterclass.com/", isFree: false, hidden: false, clicks: 0 }
                ]},
                "branschbevakning": { title: "Branschbevakning", tools: [
                    { id: "t_26", name: "Resumé", desc: "Nyheter", url: "https://www.resume.se/", isFree: false, hidden: false, clicks: 0 }
                ]}
            }
        };

        // --- SKAPAR RENA URL:ER BORT FRÅN SVENSKA TECKEN & MELLANSLAG ---
        const slugify = (text) => {
            if(!text) return 'kategori';
            return text.toString().toLowerCase()
                .replace(/[åä]/g, 'a').replace(/ö/g, 'o')
                .replace(/\s+/g, '-')       // Mellanslag till streck
                .replace(/[^\w\-]+/g, '')   // Tar bort specialtecken
                .replace(/\-\-+/g, '-')     // Inga dubbelstreck
                .replace(/^-+/, '').replace(/-+$/, '');
        };

        const generateSafeId = (prefix) => prefix + '_' + Math.random().toString(36).substr(2, 9);

        // --- STÄDFUNKTION FÖR EXISTERANDE DATABAS ---
        // Raderar ALLA mellanslag och %20 från historisk data i molnet och mappar om dem.
        const sanitizeKeys = (data) => {
            const newData = JSON.parse(JSON.stringify(data)); 
            const newNodes = { start: newData.decisionNodes.start }; 
            const newResults = {};
            const targetMap = {}; 

            // Bygger en översättningskarta: "tools_edu 1" -> "kurser-utbildning"
            Object.entries(newData.decisionNodes).forEach(([nodeId, node]) => {
                node.options.forEach(opt => {
                    if (opt.target && opt.target !== 'start') {
                        let cleanLabel = slugify(opt.label);
                        if (!cleanLabel) cleanLabel = slugify(nodeId);
                        
                        let finalSlug = cleanLabel;
                        let counter = 1;
                        while (Object.values(targetMap).includes(finalSlug) && targetMap[opt.target] !== finalSlug) {
                            finalSlug = `${cleanLabel}-${counter}`;
                            counter++;
                        }
                        targetMap[opt.target] = finalSlug;
                        opt.target = finalSlug;
                    }
                });
            });

            // Ersätter gamla nycklar med nya fina URL:er
            Object.entries(newData.decisionNodes).forEach(([nodeId, node]) => {
                if (nodeId !== 'start') {
                    const newKey = targetMap[nodeId] || nodeId;
                    newNodes[newKey] = node;
                }
            });

            Object.entries(newData.toolResults || {}).forEach(([resId, res]) => {
                const newKey = targetMap[resId] || resId;
                newResults[newKey] = res;
            });

            return { ...newData, decisionNodes: newNodes, toolResults: newResults };
        };

        // --- PADDING ---
        const padArrayToTen = (arr, type) => {
            const newArr = [...arr];
            let gridItemsCount = newArr.filter(i => !i.hidden || i.isDraft).length;
            while(gridItemsCount < 10) {
                const uniqueId = generateSafeId('draft');
                if (type === 'option') { newArr.push({ id: 'opt_' + uniqueId, label: 'Tom plats', desc: '', icon: 'Plus', target: '', hidden: true, isDraft: true }); } 
                else { newArr.push({ id: 'tool_' + uniqueId, name: 'Tom plats', desc: '', url: '', isFree: true, hidden: true, isDraft: true, clicks: 0 }); }
                gridItemsCount++;
            }
            return newArr;
        };

        const padDataStructure = (data) => {
            const paddedNodes = {};
            for (const key in data.decisionNodes) { paddedNodes[key] = { ...data.decisionNodes[key], options: padArrayToTen(data.decisionNodes[key].options, 'option') }; }
            const paddedResults = {};
            for (const key in data.toolResults) { paddedResults[key] = { ...data.toolResults[key], tools: padArrayToTen(data.toolResults[key].tools, 'tool') }; }
            return { ...data, decisionNodes: paddedNodes, toolResults: paddedResults };
        };

        const Icon = ({ name, size = 24, className = "" }) => {
            const containerRef = React.useRef(null);
            React.useEffect(() => {
                if (window.lucide && containerRef.current) {
                    const iconName = window.lucide.icons[name] ? name : 'ChevronRight';
                    containerRef.current.innerHTML = `<i data-lucide="${iconName}"></i>`;
                    window.lucide.createIcons({ root: containerRef.current, attrs: { class: className, width: size, height: size, strokeWidth: 1.5 } });
                }
            }, [name, className, size]);
            return <span ref={containerRef} className={`inline-flex items-center justify-center shrink-0 ${className}`}></span>;
        };

        const isPublic = (item) => {
            if (item.hidden) return false;
            if (item.isDraft) return false;
            if (item.label === 'Tom plats' || item.name === 'Tom plats') return false;
            if (!item.label && !item.name) return false;
            return true;
        };

        // --- MATEMATISK FUNKTION FÖR ATT FÖRHINDRA FÖRÄLDRALÖSA KORT ---
        const getDynamicGridClass = (len) => {
            if (len === 1) return "grid grid-cols-1 max-w-sm mx-auto gap-5";
            if (len === 2 || len === 4) return "grid grid-cols-1 sm:grid-cols-2 max-w-2xl mx-auto gap-5";
            if (len === 7 || len === 10) return "grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5";
            return "grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5";
        };

        // --- HUVUDAPPLIKATIONEN ---
        const App = () => {
            // Historiestack som läser från URL:en direkt när användaren laddar sidan
            const [history, setHistory] = React.useState(() => {
                const initialHash = window.location.hash.replace('#', '');
                return initialHash && initialHash !== 'start' ? ['start', initialHash] : ['start'];
            });
            
            const [appData, setAppData] = React.useState(padDataStructure(INITIAL_DATA));
            const [isLoading, setIsLoading] = React.useState(true);
            const [isAdmin, setIsAdmin] = React.useState(false);
            const [adminPass, setAdminPass] = React.useState(""); 
            const [saveStatus, setSaveStatus] = React.useState(""); 
            
            const [focusStack, setFocusStack] = React.useState([]); 
            const [selectedChildId, setSelectedChildId] = React.useState(null); 
            const [currentPage, setCurrentPage] = React.useState(0);
            
            const [searchQuery, setSearchQuery] = React.useState('');

            // LYSSNAR PÅ WEBBLÄSARENS TILLBAKA-KNAPP / SWIPE
            React.useEffect(() => {
                const handlePopState = () => {
                    const currentHash = window.location.hash.replace('#', '') || 'start';
                    setSearchQuery('');
                    
                    setHistory(prevHistory => {
                        // Om användaren klickat bakåt och har en stack
                        if (prevHistory.length > 1 && prevHistory[prevHistory.length - 2] === currentHash) {
                            return prevHistory.slice(0, -1);
                        }
                        // Om de hoppar framåt eller ändrar URL:en manuellt
                        if (prevHistory[prevHistory.length - 1] !== currentHash) {
                            return [...prevHistory, currentHash];
                        }
                        return prevHistory;
                    });
                };
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, []);

            // HÄMTA DATA FRÅN MOLNET & STÄDA GAMLA FULA URL:ER
            React.useEffect(() => {
                const loadData = async () => {
                    try {
                        const res = await fetch('/api/get');
                        const result = await res.json();
                        if (result.success && result.data) {
                            // Kör datan genom städfunktionen innan den landar i appen
                            setAppData(padDataStructure(sanitizeKeys(result.data)));
                        } else {
                            setAppData(padDataStructure(INITIAL_DATA));
                        }
                    } catch (e) {
                        console.error("Kunde inte hämta data från molnet, använder lokal backup", e);
                        const saved = localStorage.getItem('crispFullData');
                        if (saved) setAppData(padDataStructure(sanitizeKeys(JSON.parse(saved))));
                    } finally {
                        setIsLoading(false);
                    }
                };
                loadData();
            }, []);

            // AUTO-SPARA TILL MOLNET (DEBOUNCE)
            React.useEffect(() => {
                if (!isAdmin || !adminPass || isLoading) return;
                
                const timer = setTimeout(async () => {
                    setSaveStatus("Sparar till molnet...");
                    try {
                        const res = await fetch('/api/save', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ adminPassword: adminPass, appData: appData })
                        });
                        const result = await res.json();
                        if(result.success) {
                            setSaveStatus("Sparat!");
                        } else {
                            setSaveStatus("Fel vid sparning!");
                        }
                    } catch (e) {
                        setSaveStatus("Nätverksfel!");
                    }
                    
                    setTimeout(() => setSaveStatus(""), 3000);
                }, 1500);

                return () => clearTimeout(timer);
            }, [appData, isAdmin, adminPass, isLoading]);

            const updateData = (newData) => { 
                const finalData = padDataStructure(newData); 
                setAppData(finalData); 
                localStorage.setItem('crispFullData', JSON.stringify(finalData)); 
            };

            const toggleAdmin = () => { 
                if (isAdmin) { 
                    setIsAdmin(false); 
                    setFocusStack([]); 
                    setAdminPass(""); 
                    return; 
                } 
                const pass = prompt("Ange administratörslösenord:");
                if (pass === "crispadmin") {
                    setIsAdmin(true); 
                    setAdminPass(pass); 
                } else {
                    alert("Nekad åtkomst."); 
                }
            };

            // Mutations
            const mutateSiteSetting = (key, val) => updateData({ ...appData, siteSettings: { ...appData.siteSettings, [key]: val } });
            const mutateOptionField = (nodeId, optId, field, val) => {
                const newNodes = { ...appData.decisionNodes }; newNodes[nodeId].options = newNodes[nodeId].options.map(o => o.id === optId ? { ...o, [field]: val } : o);
                updateData({ ...appData, decisionNodes: newNodes });
            };
            const mutateMultipleOptionFields = (nodeId, optId, updates) => {
                const newNodes = { ...appData.decisionNodes }; newNodes[nodeId].options = newNodes[nodeId].options.map(o => o.id === optId ? { ...o, ...updates } : o);
                updateData({ ...appData, decisionNodes: newNodes });
            };
            const mutateToolField = (resId, toolId, field, val) => {
                const newRes = { ...appData.toolResults }; newRes[resId].tools = newRes[resId].tools.map(t => t.id === toolId ? { ...t, [field]: val } : t);
                updateData({ ...appData, toolResults: newRes });
            };
            const mutateMultipleToolFields = (resId, toolId, updates) => {
                const newRes = { ...appData.toolResults }; newRes[resId].tools = newRes[resId].tools.map(t => t.id === toolId ? { ...t, ...updates } : t);
                updateData({ ...appData, toolResults: newRes });
            };

            // Analytics Light
            const handleToolClick = (resId, toolId) => {
                if(isAdmin) return; 
                const newRes = { ...appData.toolResults };
                const toolIndex = newRes[resId].tools.findIndex(t => t.id === toolId);
                if(toolIndex > -1) {
                    const currentClicks = newRes[resId].tools[toolIndex].clicks || 0;
                    newRes[resId].tools[toolIndex].clicks = currentClicks + 1;
                    updateData({ ...appData, toolResults: newRes });
                }
            };

            // Edit-in-place
            const handleInlineEdit = (type, parentId, itemId, field, value, currentItem) => {
                const updates = { [field]: value };
                if (currentItem.isDraft && typeof value === 'string' && value.trim() !== '') {
                    updates.isDraft = false;
                    updates.hidden = false;
                    if(type === 'option') updates.icon = 'Folder'; 
                }
                if (type === 'tool') mutateMultipleToolFields(parentId, itemId, updates);
                else mutateMultipleOptionFields(parentId, itemId, updates);
            };

            // SKAPAR NYA MÖPPAR OCH ANVÄNDER SLUGIFY FÖR RENA URL:ER
            const createTargetPage = (cardId, parentId, type) => {
                const newData = { ...appData }; 
                const card = newData.decisionNodes[parentId].options.find(o => o.id === cardId);
                
                let newPageId = slugify(card.label || (type === 'node' ? 'kategori' : 'verktyg'));
                
                // Om namnet redan finns, lägg till en siffra i URL:en
                let counter = 1;
                let finalId = newPageId;
                while (newData.decisionNodes[finalId] || newData.toolResults[finalId]) {
                    finalId = `${newPageId}-${counter}`;
                    counter++;
                }
                
                if (type === 'node') { newData.decisionNodes[finalId] = { question: card.label || 'Ny Kategori', subtitle: '', options: padArrayToTen([], 'option') }; } 
                else { newData.toolResults[finalId] = { title: card.label || 'Ny Verktygslista', tools: padArrayToTen([], 'tool') }; }
                
                newData.decisionNodes[parentId].options = newData.decisionNodes[parentId].options.map(o => o.id === cardId ? { ...o, target: finalId } : o);
                updateData(newData);
            };

            // DRAG AND DROP
            const [draggedId, setDraggedId] = React.useState(null);
            const [dragOverId, setDragOverId] = React.useState(null);
            
            const handleDragStart = (e, id) => { 
                setDraggedId(id); 
                e.dataTransfer.effectAllowed = "move"; 
            };
            
            const handleDragOver = (e, id) => { 
                e.preventDefault(); 
                if(id !== dragOverId) setDragOverId(id); 
            };
            
            const handleDragEnd = () => { 
                setDraggedId(null); 
                setDragOverId(null); 
            };
            
            const handleDrop = (e, targetId, parentId, isToolList) => {
                e.preventDefault(); 
                e.stopPropagation(); 
                if (draggedId === targetId) return handleDragEnd();
                
                const newData = { ...appData };
                const list = isToolList ? [...newData.toolResults[parentId].tools] : [...newData.decisionNodes[parentId].options];
                const fromIdx = list.findIndex(i => i.id === draggedId); 
                const toIdx = list.findIndex(i => i.id === targetId);
                
                if(fromIdx > -1 && toIdx > -1) {
                    const [moved] = list.splice(fromIdx, 1); 
                    list.splice(toIdx, 0, moved);
                    if (isToolList) newData.toolResults[parentId].tools = list; 
                    else newData.decisionNodes[parentId].options = list;
                    updateData(newData);
                }
                handleDragEnd();
            };

            const navigate = (target) => { 
                if (!target) return; 
                setSearchQuery(''); setCurrentPage(0); 
                const newHistory = [...history, target]; 
                setHistory(newHistory); 
                window.history.pushState({}, '', '#' + target); 
                window.scrollTo({ top: 0 }); 
            };
            
            const goBack = () => { 
                setSearchQuery(''); setCurrentPage(0); 
                if (history.length > 1) { 
                    const newHistory = [...history]; 
                    newHistory.pop(); 
                    setHistory(newHistory); 
                    window.history.pushState({}, '', '#' + newHistory[newHistory.length - 1]); 
                    window.scrollTo({ top: 0 }); 
                } 
            };
            
            const goHome = () => { 
                setSearchQuery(''); setCurrentPage(0); 
                setHistory(['start']); 
                setFocusStack([]); 
                window.history.pushState({}, '', '#start'); 
                window.scrollTo({ top: 0 }); 
            };

            const currentNodeId = history[history.length - 1];
            const isResult = Boolean(appData.toolResults[currentNodeId]);
            const nodeData = !isResult ? appData.decisionNodes[currentNodeId] : null;
            const resultData = isResult ? appData.toolResults[currentNodeId] : null;

            // GLOBAL SÖKMOTOR MED DEDUPLICERING
            const searchResults = React.useMemo(() => {
                if (!searchQuery.trim()) return [];
                const query = searchQuery.toLowerCase();
                const rawResults = [];

                Object.entries(appData.toolResults).forEach(([resId, resData]) => {
                    resData.tools.forEach(tool => {
                        if (isPublic(tool)) {
                            if ((tool.name || '').toLowerCase().includes(query) || (tool.desc || '').toLowerCase().includes(query)) {
                                rawResults.push({ id: tool.id, title: tool.name, desc: tool.desc, type: 'tool', destination: tool.url, isFree: tool.isFree, parentId: resId, clicks: tool.clicks });
                            }
                        }
                    });
                });

                Object.entries(appData.decisionNodes).forEach(([nodeId, nodeData]) => {
                    if ((nodeData.question || '').toLowerCase().includes(query) || (nodeData.subtitle || '').toLowerCase().includes(query)) {
                        if(nodeId !== 'start') {
                            rawResults.push({ id: nodeId, title: nodeData.question, desc: nodeData.subtitle, type: 'nav', destination: nodeId, icon: 'LayoutGrid' });
                        }
                    }
                    nodeData.options.forEach(opt => {
                        if (isPublic(opt)) {
                            if ((opt.label || '').toLowerCase().includes(query) || (opt.desc || '').toLowerCase().includes(query)) {
                                rawResults.push({ id: opt.id, title: opt.label, desc: opt.desc, type: 'nav', destination: opt.target || nodeId, icon: opt.icon });
                            }
                        }
                    });
                });

                const unique = [];
                const seen = new Set();
                rawResults.forEach(item => {
                    const key = `${(item.title || '').toLowerCase()}_${item.destination}`;
                    if (!seen.has(key)) {
                        seen.add(key);
                        unique.push(item);
                    }
                });

                return unique;
            }, [appData, searchQuery]);

            if (isLoading) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center relative z-10 text-white">
                        <Icon name="Loader2" className="animate-spin text-blue-500 mb-4" size={48} />
                        <h2 className="text-xl font-light">Ansluter till molndatabasen...</h2>
                    </div>
                );
            }

            // --------------------------------------------------------
            // KOMPONENT: FOKUS-LÄGE (ADMIN EDITERING)
            // --------------------------------------------------------
            if (focusStack.length > 0) {
                const currentFocus = focusStack[focusStack.length - 1];
                const isTool = currentFocus.isTool;
                const parentData = isTool ? appData.toolResults[currentFocus.parentId] : appData.decisionNodes[currentFocus.parentId];
                const card = isTool ? parentData.tools.find(t => t.id === currentFocus.cardId) : parentData.options.find(o => o.id === currentFocus.cardId);

                if (!card) return <div className="p-10 text-white">Laddar... <button onClick={() => setFocusStack([])}>Stäng</button></div>;

                const hasTarget = !isTool && card.target;
                const targetNode = hasTarget && appData.decisionNodes[card.target];
                const targetResult = hasTarget && appData.toolResults[card.target];
                const children = targetNode ? targetNode.options : (targetResult ? targetResult.tools : []);
                const childrenAreTools = Boolean(targetResult);

                const selectedChild = children.find(c => c.id === selectedChildId);
                const hasGrandTarget = selectedChild && !childrenAreTools && selectedChild.target;
                const grandGrandNode = hasGrandTarget && appData.decisionNodes[selectedChild.target];
                const grandGrandResult = hasGrandTarget && appData.toolResults[selectedChild.target];
                const grandChildren = grandGrandNode ? grandGrandNode.options : (grandGrandResult ? grandGrandResult.tools : []);
                const grandChildrenAreTools = Boolean(grandGrandResult);

                return (
                    <div className="fixed inset-0 bg-space-base z-50 flex flex-col p-3 overflow-hidden column-enter">
                        {/* Compact Header */}
                        <div className="flex justify-between items-center bg-white/5 p-3 rounded-xl border border-white/10 mb-3 shadow-lg shrink-0">
                            <button onClick={() => { const newStack = [...focusStack]; newStack.pop(); setFocusStack(newStack); setSelectedChildId(null); }} className="text-white hover:text-blue-300 flex items-center gap-2 text-sm font-medium">
                                <Icon name="ArrowLeft" size={16} /> {focusStack.length > 1 ? "Upp en nivå" : "Stäng Fokus-läge"}
                            </button>
                            <div className="flex items-center gap-2 text-xs text-white/50 bg-black/40 px-3 py-1.5 rounded-lg border border-white/5">
                                <Icon name="Lock" size={12} className="text-blue-400" /> ADMIN-REDIGERARE <Icon name="ChevronRight" size={12}/> 
                                <span className="text-white">{focusStack.length > 1 ? "... / " : ""}{isTool ? card.name : card.label}</span>
                                {saveStatus && <span className="ml-3 text-[10px] text-green-400 font-bold tracking-widest uppercase">{saveStatus}</span>}
                            </div>
                        </div>

                        {/* HORISONTELT TRÄD */}
                        <div className="flex flex-1 gap-3 overflow-x-auto pb-2 items-start h-full">
                            
                            {/* KOLUMN 1: VALT KORT (PARENT) */}
                            <div className="glass-panel w-[280px] h-full shrink-0 rounded-2xl border-t-2 border-t-blue-500 p-4 flex flex-col gap-4 overflow-y-auto">
                                <h3 className="text-[11px] text-white/30 uppercase tracking-widest font-bold">1. Detta Kort</h3>
                                
                                {!isTool && (
                                    <div className="flex items-center gap-3 bg-black/30 p-3 rounded-lg border border-white/5">
                                        <div className="w-12 h-12 bg-white/5 rounded-lg flex items-center justify-center border border-white/10 shadow-inner shrink-0">
                                            <Icon name={card.icon || "Folder"} size={28} className="text-blue-300" />
                                        </div>
                                        <div className="flex-1">
                                            <input type="text" value={card.icon || ""} onChange={(e) => mutateOptionField(currentFocus.parentId, card.id, 'icon', e.target.value)} placeholder="Ikon-namn" className="editable-input text-[11px] p-1.5" />
                                            <a href="https://lucide.dev/icons/" target="_blank" className="text-[9px] text-blue-400 hover:text-blue-300 mt-1 inline-block">Sök ikon &rarr;</a>
                                        </div>
                                    </div>
                                )}
                                
                                <div>
                                    <label className="text-[10px] text-white/40 block mb-1">Namn / Rubrik</label>
                                    <input type="text" value={isTool ? card.name : card.label} onChange={(e) => isTool ? mutateToolField(currentFocus.parentId, card.id, 'name', e.target.value) : mutateOptionField(currentFocus.parentId, card.id, 'label', e.target.value)} className="editable-input font-medium" />
                                </div>
                                <div>
                                    <label className="text-[10px] text-white/40 block mb-1">Beskrivning</label>
                                    <textarea rows="3" value={card.desc || ""} onChange={(e) => isTool ? mutateToolField(currentFocus.parentId, card.id, 'desc', e.target.value) : mutateOptionField(currentFocus.parentId, card.id, 'desc', e.target.value)} className="editable-input text-white/70" />
                                </div>
                                
                                {isTool && (
                                    <div className="flex flex-col gap-3 p-3 bg-black/30 rounded-lg border border-white/5">
                                        <div>
                                            <label className="text-[10px] text-white/40 block mb-1">Länk (URL)</label>
                                            <input type="text" value={card.url || ""} onChange={(e) => mutateToolField(currentFocus.parentId, card.id, 'url', e.target.value)} placeholder="https://..." className="editable-input text-blue-300" />
                                        </div>
                                        <button onClick={() => mutateToolField(currentFocus.parentId, card.id, 'isFree', !card.isFree)} className={`w-full py-1.5 rounded text-[11px] font-bold ${card.isFree ? 'bg-green-500 text-black' : 'bg-white/10 text-white/50'}`}>
                                            {card.isFree ? 'GRATIS' : 'KOSTAR PENGAR'}
                                        </button>
                                        <div className="mt-2 text-center text-[10px] text-blue-300 bg-blue-900/20 py-2 rounded border border-blue-500/20 flex items-center justify-center gap-1">
                                            <Icon name="MousePointerClick" size={12} /> Klickat {card.clicks || 0} gånger av användare
                                        </div>
                                    </div>
                                )}
                                
                                <div className="mt-auto pt-4 border-t border-white/10 flex flex-col gap-2">
                                    <span className="text-[10px] text-white/30 truncate">Status: {card.isDraft ? "Tom plats" : (card.hidden ? "Dolt" : "Publicerad")}</span>
                                    <div className="flex gap-2">
                                        <button onClick={() => isTool ? mutateMultipleToolFields(currentFocus.parentId, card.id, { hidden: false, isDraft: false }) : mutateMultipleOptionFields(currentFocus.parentId, card.id, { hidden: false, isDraft: false })} className="flex-1 bg-green-900/40 hover:bg-green-600/50 text-green-300 py-1.5 rounded text-[10px]">Publicera</button>
                                        <button onClick={() => isTool ? mutateMultipleToolFields(currentFocus.parentId, card.id, { hidden: true }) : mutateMultipleOptionFields(currentFocus.parentId, card.id, { hidden: true })} className="flex-1 bg-red-900/40 hover:bg-red-900/60 text-red-300 py-1.5 rounded text-[10px]">Dölj</button>
                                    </div>
                                </div>
                            </div>

                            {/* KOLUMN 2: BARN */}
                            {!isTool && (
                                <div className="glass-panel w-[340px] h-full shrink-0 rounded-2xl border-t-2 border-t-purple-500 p-4 flex flex-col overflow-y-auto column-enter transition-all" style={{animationDelay: '0.1s'}}>
                                    <h3 className="text-[11px] text-white/30 uppercase tracking-widest font-bold mb-4 flex justify-between items-center">
                                        <span>2. Innehåll ({childrenAreTools ? 'Verktyg' : 'Kategorier'})</span>
                                        <span className="text-white/10">{children.filter(c=>!c.isDraft).length}/10</span>
                                    </h3>
                                    
                                    {!hasTarget ? (
                                        <div className="text-center p-6 bg-black/20 rounded-xl border border-dashed border-white/10 my-auto">
                                            <Icon name="FolderOpen" size={32} className="mx-auto text-white/10 mb-3" />
                                            <p className="text-xs text-white/40 mb-4">Denna mapp saknar innehåll.</p>
                                            <div className="flex flex-col gap-2">
                                                <button onClick={() => createTargetPage(card.id, currentFocus.parentId, 'node')} className="w-full bg-blue-600/40 text-white text-[11px] py-2 rounded-lg hover:bg-blue-600/60 flex items-center justify-center gap-1.5 transition-colors"><Icon name="FolderPlus" size={14}/> Skapa Underkategorier</button>
                                                <button onClick={() => createTargetPage(card.id, currentFocus.parentId, 'tools')} className="w-full bg-purple-600/40 text-white text-[11px] py-2 rounded-lg hover:bg-purple-600/60 flex items-center justify-center gap-1.5 transition-colors"><Icon name="ListPlus" size={14}/> Skapa Verktygslista</button>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="flex flex-col gap-2">
                                            <p className="text-[10px] text-purple-300/50 mb-1">Tips: Dra för att sortera. Ändra text direkt.</p>
                                            {children.map((child) => (
                                                <div key={child.id} 
                                                    draggable={!child.isDraft}
                                                    onDragStart={(e) => handleDragStart(e, child.id)}
                                                    onDragOver={(e) => handleDragOver(e, child.id)}
                                                    onDrop={(e) => handleDrop(e, child.id, card.target, childrenAreTools)}
                                                    onDragEnd={handleDragEnd}
                                                    onClick={() => !child.isDraft && setSelectedChildId(child.id)}
                                                    className={`group flex flex-col gap-1.5 p-3 rounded-xl border transition-all ${!child.isDraft ? 'cursor-grab' : ''} ${selectedChildId === child.id ? 'bg-purple-900/40 border-purple-500 shadow-lg' : 'bg-black/40 border-white/5 hover:border-white/20'} ${child.isDraft ? 'opacity-40 border-dashed hover:opacity-100' : ''} ${draggedId === child.id ? 'dragging' : ''} ${dragOverId === child.id ? 'drag-over' : ''}`}>
                                                    
                                                    <div className="flex gap-2 items-center w-full">
                                                        <Icon name={child.icon || (child.isDraft ? "Plus" : "Folder")} size={16} className={`shrink-0 ${child.isDraft ? "text-white/30" : "text-purple-300"}`} />
                                                        
                                                        <input 
                                                            type="text"
                                                            value={childrenAreTools ? child.name : child.label}
                                                            placeholder={child.isDraft ? "Skriv namn för att skapa..." : "Rubrik..."}
                                                            onChange={(e) => handleInlineEdit(childrenAreTools ? 'tool' : 'option', card.target, child.id, childrenAreTools ? 'name' : 'label', e.target.value, child)}
                                                            onClick={(e) => { e.stopPropagation(); !child.isDraft && setSelectedChildId(child.id); }}
                                                            className={`tree-input font-medium flex-1 min-w-0 ${child.isDraft ? 'text-white/50 italic' : 'text-white'}`}
                                                        />

                                                        {!child.isDraft && (
                                                            <div className="flex items-center gap-1 shrink-0">
                                                                <button 
                                                                    onClick={(e) => { e.stopPropagation(); handleInlineEdit(childrenAreTools ? 'tool' : 'option', card.target, child.id, 'hidden', !child.hidden, child); }}
                                                                    className={`p-1.5 rounded transition-colors ${child.hidden ? 'text-red-400 bg-red-400/10' : 'text-green-400 hover:bg-white/10'}`} 
                                                                    title={child.hidden ? "Dolt" : "Synligt"}>
                                                                    <Icon name={child.hidden ? 'EyeOff' : 'Eye'} size={14} />
                                                                </button>
                                                                
                                                                {!childrenAreTools && (
                                                                    <button 
                                                                        onClick={(e) => { e.stopPropagation(); setFocusStack([...focusStack, { parentId: card.target, cardId: child.id, isTool: false }]); setSelectedChildId(null); }}
                                                                        className="bg-white/5 hover:bg-white/20 text-white p-1.5 rounded transition-all" title="Dyk in i mappen">
                                                                        <Icon name="ArrowRight" size={14} />
                                                                    </button>
                                                                )}
                                                            </div>
                                                        )}
                                                    </div>

                                                    {!child.isDraft && (
                                                        <div className="pl-6 flex items-center">
                                                            <input 
                                                                type="text"
                                                                value={child.desc || ""}
                                                                placeholder="Lägg till beskrivning..."
                                                                onChange={(e) => handleInlineEdit(childrenAreTools ? 'tool' : 'option', card.target, child.id, 'desc', e.target.value, child)}
                                                                onClick={(e) => { e.stopPropagation(); setSelectedChildId(child.id); }}
                                                                className="tree-input text-[11px] text-white/50 w-full"
                                                            />
                                                        </div>
                                                    )}

                                                    {!child.isDraft && (
                                                        <div className="pl-6 flex items-center gap-2 mt-1">
                                                            {childrenAreTools ? (
                                                                <>
                                                                    <input 
                                                                        type="text" value={child.url || ""} placeholder="Länk: https://"
                                                                        onChange={(e) => handleInlineEdit('tool', card.target, child.id, 'url', e.target.value, child)}
                                                                        onClick={(e) => { e.stopPropagation(); setSelectedChildId(child.id); }}
                                                                        className="tree-input text-[10px] text-blue-300/80 flex-1 min-w-0"
                                                                    />
                                                                    <button 
                                                                        onClick={(e) => { e.stopPropagation(); handleInlineEdit('tool', card.target, child.id, 'isFree', !child.isFree, child); }}
                                                                        className={`px-2 py-0.5 rounded text-[9px] font-bold shrink-0 transition-colors ${child.isFree ? 'bg-green-500/20 text-green-300' : 'bg-white/10 text-white/40'}`}>
                                                                        {child.isFree ? 'GRATIS' : 'KOSTAR'}
                                                                    </button>
                                                                    <div className="flex items-center gap-1 px-1.5 py-0.5 rounded text-[9px] text-blue-200 bg-blue-500/20 shrink-0" title="Antal klick från användare">
                                                                        <Icon name="MousePointerClick" size={10} /> {child.clicks || 0}
                                                                    </div>
                                                                </>
                                                            ) : (
                                                                <input 
                                                                    type="text" value={child.icon || ""} placeholder="Ikon-namn (t.ex. Folder)"
                                                                    onChange={(e) => handleInlineEdit('option', card.target, child.id, 'icon', e.target.value, child)}
                                                                    onClick={(e) => { e.stopPropagation(); setSelectedChildId(child.id); }}
                                                                    className="tree-input text-[10px] text-purple-300/50 w-1/2"
                                                                />
                                                            )}
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* KOLUMN 3: BARNBARN */}
                            {selectedChildId && !childrenAreTools && (
                                <div className="glass-panel w-[340px] h-full shrink-0 rounded-2xl border-t-2 border-t-green-500 p-4 flex flex-col overflow-y-auto column-enter transition-all" style={{animationDelay: '0.15s'}}>
                                    <h3 className="text-[11px] text-white/30 uppercase tracking-widest font-bold mb-4 truncate flex justify-between">
                                        <span>3. Innehåll i "{selectedChild ? (childrenAreTools ? selectedChild.name : selectedChild.label) : "..."}"</span>
                                    </h3>
                                    
                                    {!hasGrandTarget ? (
                                        <div className="text-center p-6 bg-black/20 rounded-xl border border-dashed border-white/10 my-auto">
                                            <p className="text-xs text-white/40 mb-3">Denna undermapp är tom.</p>
                                            <button 
                                                onClick={() => { setFocusStack([...focusStack, { parentId: selectedChild.parentId, cardId: selectedChild.id, isTool: childrenAreTools }]); setSelectedChildId(null); }}
                                                className="w-full bg-white/10 hover:bg-white/20 text-white text-[11px] py-2 rounded-lg flex items-center justify-center gap-1.5 transition-colors"><Icon name="ArrowRight" size={14}/> Dyk in för att bygga strukturen</button>
                                        </div>
                                    ) : (
                                        <div className="flex flex-col gap-2">
                                            {grandChildren.map((gc) => (
                                                <div key={gc.id} 
                                                    draggable={!gc.isDraft}
                                                    onDragStart={(e) => handleDragStart(e, gc.id)}
                                                    onDragOver={(e) => handleDragOver(e, gc.id)}
                                                    onDrop={(e) => handleDrop(e, gc.id, selectedChild.target, grandChildrenAreTools)}
                                                    onDragEnd={handleDragEnd}
                                                    className={`group flex flex-col gap-1.5 p-3 rounded-xl border bg-black/40 border-white/5 hover:border-white/20 transition-all ${!gc.isDraft ? 'cursor-grab' : ''} ${gc.isDraft ? 'opacity-40 border-dashed hover:opacity-100' : ''} ${draggedId === gc.id ? 'dragging' : ''} ${dragOverId === gc.id ? 'drag-over' : ''}`}>
                                                    
                                                    <div className="flex gap-2 items-center w-full">
                                                        <Icon name={gc.icon || (gc.isDraft ? "Plus" : "Folder")} size={16} className={`shrink-0 ${gc.isDraft ? "text-white/30" : "text-green-300"}`} />
                                                        
                                                        <input 
                                                            type="text"
                                                            value={grandChildrenAreTools ? gc.name : gc.label}
                                                            placeholder={gc.isDraft ? "Skriv namn för att skapa..." : "Rubrik..."}
                                                            onChange={(e) => handleInlineEdit(grandChildrenAreTools ? 'tool' : 'option', selectedChild.target, gc.id, grandChildrenAreTools ? 'name' : 'label', e.target.value, gc)}
                                                            onClick={(e) => e.stopPropagation()}
                                                            className={`tree-input font-medium flex-1 min-w-0 ${gc.isDraft ? 'text-white/50 italic' : 'text-white'}`}
                                                        />

                                                        {!gc.isDraft && (
                                                            <div className="flex items-center gap-1 shrink-0">
                                                                <button 
                                                                    onClick={(e) => { e.stopPropagation(); handleInlineEdit(grandChildrenAreTools ? 'tool' : 'option', selectedChild.target, gc.id, 'hidden', !gc.hidden, gc); }}
                                                                    className={`p-1.5 rounded transition-colors ${gc.hidden ? 'text-red-400 bg-red-400/10' : 'text-green-400 hover:bg-white/10'}`} 
                                                                    title={gc.hidden ? "Dolt" : "Synligt"}>
                                                                    <Icon name={gc.hidden ? 'EyeOff' : 'Eye'} size={14} />
                                                                </button>
                                                                
                                                                {!grandChildrenAreTools && (
                                                                    <button 
                                                                        onClick={(e) => { e.stopPropagation(); setFocusStack([...focusStack, { parentId: selectedChild.target, cardId: gc.id, isTool: false }]); setSelectedChildId(null); }}
                                                                        className="bg-white/5 hover:bg-white/20 text-white p-1.5 rounded transition-all" title="Dyk in i mappen">
                                                                        <Icon name="ArrowRight" size={14} />
                                                                    </button>
                                                                )}
                                                            </div>
                                                        )}
                                                    </div>
                                                    
                                                    {!gc.isDraft && (
                                                        <div className="pl-6 flex items-center">
                                                            <input 
                                                                type="text"
                                                                value={gc.desc || ""}
                                                                placeholder="Lägg till beskrivning..."
                                                                onChange={(e) => handleInlineEdit(grandChildrenAreTools ? 'tool' : 'option', selectedChild.target, gc.id, 'desc', e.target.value, gc)}
                                                                onClick={(e) => e.stopPropagation()}
                                                                className="tree-input text-[11px] text-white/50 w-full"
                                                            />
                                                        </div>
                                                    )}

                                                    {!gc.isDraft && (
                                                        <div className="pl-6 flex items-center gap-2 mt-1">
                                                            {grandChildrenAreTools ? (
                                                                <>
                                                                    <input 
                                                                        type="text" value={gc.url || ""} placeholder="Länk: https://"
                                                                        onChange={(e) => handleInlineEdit('tool', selectedChild.target, gc.id, 'url', e.target.value, gc)}
                                                                        onClick={(e) => e.stopPropagation()}
                                                                        className="tree-input text-[10px] text-blue-300/80 flex-1 min-w-0"
                                                                    />
                                                                    <button 
                                                                        onClick={(e) => { e.stopPropagation(); handleInlineEdit('tool', selectedChild.target, gc.id, 'isFree', !gc.isFree, gc); }}
                                                                        className={`px-2 py-0.5 rounded text-[9px] font-bold shrink-0 transition-colors ${gc.isFree ? 'bg-green-500/20 text-green-300' : 'bg-white/10 text-white/40'}`}>
                                                                        {gc.isFree ? 'GRATIS' : 'KOSTAR'}
                                                                    </button>
                                                                    <div className="flex items-center gap-1 px-1.5 py-0.5 rounded text-[9px] text-blue-200 bg-blue-500/20 shrink-0" title="Antal klick">
                                                                        <Icon name="MousePointerClick" size={10} /> {gc.clicks || 0}
                                                                    </div>
                                                                </>
                                                            ) : (
                                                                <input 
                                                                    type="text" value={gc.icon || ""} placeholder="Ikon-namn"
                                                                    onChange={(e) => handleInlineEdit('option', selectedChild.target, gc.id, 'icon', e.target.value, gc)}
                                                                    onClick={(e) => e.stopPropagation()}
                                                                    className="tree-input text-[10px] text-green-300/50 w-1/2"
                                                                />
                                                            )}
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}

                        </div>
                    </div>
                )
            }


            // --------------------------------------------------------
            // STANDARD-VY OCH SÖK-VY
            // --------------------------------------------------------
            let renderList = [];
            if (nodeData) renderList = isAdmin ? nodeData.options : nodeData.options.filter(isPublic);
            else if (resultData) renderList = isAdmin ? resultData.tools : resultData.tools.filter(isPublic);

            return (
                <div className="min-h-screen flex flex-col relative z-10">
                    <header className="w-full max-w-7xl mx-auto px-4 md:px-6 pt-6 pb-4 flex justify-between items-center shrink-0">
                        <img src={appData.siteSettings.logo} alt="Logo" className="h-16 md:h-24 w-auto object-contain cursor-pointer" onClick={!isAdmin ? goHome : undefined} />
                        <div className="relative">
                            <Icon name="Search" size={16} className="absolute left-3 top-1/2 transform -translate-y-1/2 text-white/40" />
                            <input 
                                type="text" 
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                                placeholder={appData.siteSettings.searchPlaceholder} 
                                className="bg-white/5 border border-white/10 rounded-full pl-10 pr-4 py-2 text-sm text-white w-48 sm:w-64 outline-none focus:border-white/30 transition-colors" 
                                disabled={isAdmin} 
                            />
                        </div>
                    </header>

                    <main className="flex-grow w-full max-w-5xl mx-auto px-4 pb-8 flex flex-col relative">
                        {history.length > 1 && !searchQuery && (
                            <button onClick={goBack} className="self-start flex items-center text-white/40 hover:text-white py-2 mb-4 bg-white/5 px-4 rounded-full transition-colors text-sm">
                                <Icon name="ArrowLeft" size={16} className="mr-2" /> Gå tillbaka
                            </button>
                        )}

                        {isAdmin && !searchQuery && (
                            <div className="mb-8 p-4 bg-blue-900/20 border border-blue-500/30 rounded-xl text-center text-blue-200 text-sm shadow-xl flex flex-col gap-1 items-center">
                                <div><Icon name="GripHorizontal" className="mr-2 inline" /> <strong>ADMIN:</strong> Dra korten för att sortera. Klicka på <span className="bg-blue-600 px-2 py-0.5 rounded mx-1 font-bold">Redigera Innehåll</span> för att använda snabbredigeraren.</div>
                                <div className="text-[11px] font-bold text-green-400 h-4 tracking-widest uppercase">{saveStatus}</div>
                            </div>
                        )}

                        {/* SÖKRESULTAT */}
                        {searchQuery && !isAdmin && (
                            <div className="w-full animation-fade-in max-w-3xl mx-auto">
                                <div className="text-center mb-8">
                                    <h2 className="text-3xl font-light">Sökresultat för "{searchQuery}"</h2>
                                    <p className="text-white/40 mt-2">{searchResults.length} träffar hittades</p>
                                </div>
                                
                                {searchResults.length === 0 ? (
                                    <div className="text-center p-10 bg-white/5 rounded-2xl border border-white/10">
                                        <Icon name="SearchX" size={48} className="mx-auto text-white/20 mb-4" />
                                        <p className="text-white/50">Hittade tyvärr ingenting. Prova ett annat sökord!</p>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-1 gap-4">
                                        {searchResults.map((item, idx) => (
                                            <div 
                                                key={`${item.id}_${idx}`} 
                                                onClick={() => {
                                                    if(item.type === 'nav') {
                                                        setSearchQuery('');
                                                        navigate(item.destination);
                                                    } else if (item.type === 'tool' && item.destination) {
                                                        handleToolClick(item.parentId, item.id);
                                                        window.open(item.destination, '_blank');
                                                    }
                                                }}
                                                className={`glass-panel p-5 rounded-2xl flex items-center gap-4 hover:scale-[1.02] transition-all cursor-pointer ${item.type === 'tool' ? (!item.isFree ? 'tool-paid' : 'tool-free') : 'border-purple-500/30'}`}>
                                                
                                                {item.type === 'nav' && (
                                                    <div className="w-10 h-10 rounded-full bg-purple-500/10 flex items-center justify-center shrink-0">
                                                        <Icon name={item.icon || 'Folder'} size={20} className="text-purple-400" />
                                                    </div>
                                                )}

                                                <div className="flex-1 min-w-0">
                                                    <div className="flex items-center gap-3 mb-1.5">
                                                        <h3 className="text-xl font-light truncate">{item.title}</h3>
                                                        {item.isFree && <span className="text-[10px] uppercase px-2 py-0.5 rounded-full bg-white/5 text-white/40">Gratis</span>}
                                                        {item.type === 'nav' && <span className="text-[10px] uppercase px-2 py-0.5 rounded-full bg-purple-500/20 text-purple-300 font-bold">Kategori</span>}
                                                    </div>
                                                    <p className="text-white/50 text-sm truncate">{item.desc}</p>
                                                </div>
                                                
                                                {item.type === 'tool' && item.destination && (
                                                    <div className="w-10 h-10 rounded-full bg-blue-500/10 flex items-center justify-center transition-colors shrink-0 group-hover:bg-blue-500/30">
                                                        <Icon name="ArrowUpRight" size={18} className="text-blue-400" />
                                                    </div>
                                                )}
                                                {item.type === 'nav' && (
                                                    <div className="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center transition-colors shrink-0">
                                                        <Icon name="ArrowRight" size={18} className="text-white/40" />
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* NORMAL VY: KATEGORIER */}
                        {nodeData && !searchQuery && (
                            <div className="text-center w-full animation-fade-in">
                                <h1 className="text-3xl md:text-5xl font-light mb-2">{nodeData.question}</h1>
                                <p className="text-white/50 text-lg mb-8">{nodeData.subtitle}</p>
                                
                                <div className={getDynamicGridClass(renderList.length)}>
                                    {renderList.map((opt) => (
                                        <div key={opt.id} draggable={isAdmin} onDragStart={(e) => handleDragStart(e, opt.id)} onDragOver={(e) => handleDragOver(e, opt.id)} onDrop={(e) => handleDrop(e, opt.id, currentNodeId, false)} onDragEnd={handleDragEnd}
                                            onClick={!isAdmin ? () => navigate(opt.target) : undefined}
                                            className={`glass-panel p-6 rounded-3xl flex flex-col items-center text-center transition-all ${isAdmin ? 'cursor-grab relative overflow-hidden group' : 'cursor-pointer hover:scale-105 hover:border-white/20'} ${draggedId === opt.id ? 'dragging' : ''} ${dragOverId === opt.id ? 'drag-over' : ''} ${opt.isDraft ? 'opacity-40 border-dashed border-white/20' : ''} ${opt.hidden && !opt.isDraft ? 'opacity-60 ring-2 ring-red-500/50' : ''}`}>
                                            
                                            {isAdmin && (
                                                <div className="absolute inset-0 bg-black/85 backdrop-blur-sm opacity-0 group-hover:opacity-100 transition-opacity flex flex-col justify-center items-center z-20 gap-4 cursor-default p-4">
                                                    <button onClick={(e) => { e.stopPropagation(); setFocusStack([{ parentId: currentNodeId, cardId: opt.id, isTool: false }]); }} className="w-full bg-blue-600 text-white px-6 py-3 rounded-full font-bold flex items-center justify-center gap-2 hover:bg-blue-500 hover:scale-105 transition-all shadow-lg text-sm">
                                                        <Icon name="Edit3" size={18} /> Redigera Innehåll
                                                    </button>
                                                    <div className="text-white/40 text-[11px] flex items-center gap-1.5"><Icon name="GripHorizontal" size={14}/> Dra kortet för att flytta</div>
                                                    {opt.hidden && !opt.isDraft && <span className="text-[10px] text-red-400 font-bold uppercase mt-2">Dolt för användare</span>}
                                                </div>
                                            )}

                                            <div className="p-4 rounded-full bg-white/5 mb-4 z-10 pointer-events-none"><Icon name={opt.icon} size={32} /></div>
											<h3 className="text-xl font-light mb-2 w-full z-10 truncate pointer-events-none">{opt.label}</h3>
											<p className="text-white/40 text-sm w-full z-10 line-clamp-2 pointer-events-none">{opt.desc}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* NORMAL VY: VERKTYGSLISTA */}
                        {resultData && !searchQuery && (
                            <div className="w-full animation-fade-in max-w-3xl mx-auto">
                                <div className="text-center mb-8"><h2 className="text-3xl md:text-5xl font-light">{resultData.title}</h2></div>
                                
                                <div className="grid grid-cols-1 gap-4">
                                    {renderList.map((tool) => 
                                        !isAdmin && tool.url ? (
                                            /* RIKTIG LÄNK FÖR ANVÄNDARE */
                                            <a 
                                                key={tool.id} 
                                                href={tool.url} 
                                                target="_blank" 
                                                rel="noopener noreferrer"
                                                onClick={() => handleToolClick(currentNodeId, tool.id)}
                                                className={`glass-panel p-5 rounded-2xl flex items-center gap-4 transition-all group cursor-pointer hover:scale-[1.02] ${!tool.isFree ? 'tool-paid' : 'tool-free'} ${tool.hidden ? 'opacity-60 ring-2 ring-red-500/50' : ''}`}
                                            >
                                                <div className="flex-1 w-full z-10 min-w-0 pointer-events-none">
                                                    <div className="flex items-center gap-3 mb-1.5">
                                                        <h3 className={`text-xl font-light truncate ${!tool.isFree && tool.url ? 'text-white drop-shadow-md' : ''}`}>{tool.name}</h3>
                                                        {tool.isFree && <span className="text-[10px] uppercase px-2 py-0.5 rounded-full bg-white/5 text-white/40">Gratis</span>}
                                                    </div>
                                                    <p className="text-white/50 text-sm truncate">{tool.desc}</p>
                                                </div>
                                                
                                                <div className={`w-10 h-10 rounded-full flex items-center justify-center transition-colors z-10 shrink-0 ${!tool.isFree ? 'bg-blue-500/20 group-hover:bg-blue-500/40' : 'bg-white/5 group-hover:bg-white/10'}`}>
                                                    <Icon name="ArrowUpRight" size={18} className={!tool.isFree ? "text-blue-300" : "text-white/50"} />
                                                </div>
                                            </a>
                                        ) : (
                                            /* ADMIN-VY / SAKNAR LÄNK: BEHÅLL DIV FÖR DRAG-AND-DROP */
                                            <div 
                                                key={tool.id} 
                                                draggable={isAdmin} 
                                                onDragStart={(e) => handleDragStart(e, tool.id)} 
                                                onDragOver={(e) => handleDragOver(e, tool.id)} 
                                                onDrop={(e) => handleDrop(e, tool.id, currentNodeId, true)} 
                                                onDragEnd={handleDragEnd}
                                                className={`glass-panel p-5 rounded-2xl flex items-center gap-4 transition-all group ${isAdmin ? 'cursor-grab relative overflow-hidden' : ''} ${!tool.isFree && tool.url ? 'tool-paid' : 'tool-free'} ${tool.isDraft ? 'opacity-40 border-dashed border-white/20' : ''} ${tool.hidden && !tool.isDraft ? 'opacity-60 ring-2 ring-red-500/50' : ''}`}
                                            >
                                                {isAdmin && (
                                                    <div className="absolute inset-0 bg-black/85 backdrop-blur-sm opacity-0 group-hover:opacity-100 transition-opacity flex flex-row justify-center items-center z-20 gap-4 cursor-default px-4">
                                                        <button onClick={(e) => { e.stopPropagation(); setFocusStack([{ parentId: currentNodeId, cardId: tool.id, isTool: true }]); }} className="bg-purple-600 text-white px-5 py-2.5 rounded-full font-bold flex items-center gap-2 hover:bg-purple-500 hover:scale-105 transition-all shadow-lg text-xs">
                                                            <Icon name="Edit3" size={16} /> Redigera Verktyg
                                                        </button>
                                                        <div className="text-white/40 text-[11px] flex items-center gap-1.5"><Icon name="GripVertical" size={14}/> Flytta</div>
                                                        {tool.hidden && !tool.isDraft && <span className="text-[10px] text-red-400 font-bold uppercase absolute top-2 right-4">Dolt</span>}
                                                    </div>
                                                )}

                                                <div className="flex-1 w-full z-10 min-w-0 pointer-events-none">
                                                    <div className="flex items-center gap-3 mb-1.5">
                                                        <h3 className={`text-xl font-light truncate ${!tool.isFree && tool.url ? 'text-white drop-shadow-md' : ''}`}>{tool.name}</h3>
                                                        {tool.isFree && <span className="text-[10px] uppercase px-2 py-0.5 rounded-full bg-white/5 text-white/40">Gratis</span>}
                                                    </div>
                                                    <p className="text-white/50 text-sm truncate">{tool.desc}</p>
                                                </div>
                                            </div>
                                        )
                                    )}
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="w-full max-w-4xl mx-auto px-6 py-6 text-center text-white/40 text-xs font-light shrink-0 mt-10 border-t border-white/5">
                        <p className="mb-3 leading-relaxed">{appData.siteSettings.footerText}</p>
                        <div className="flex justify-center items-center gap-2">
                            <span>{appData.siteSettings.copyright} &copy; {new Date().getFullYear()}</span>
                            <button onClick={toggleAdmin} className={`ml-4 p-1.5 rounded-lg ${isAdmin ? 'bg-red-900/50 text-red-300' : 'hover:bg-white/5 hover:text-white'}`}><Icon name={isAdmin ? "Unlock" : "Lock"} size={14} /></button>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
