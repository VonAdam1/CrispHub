<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XML Hanterare för Premiere & DaVinci</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
            background-color: #f4f4f9;
            color: #333;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 1rem;
        }
        h1 { margin-top: 0; color: #2c3e50; }
        .hidden { display: none !important; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        input[type="text"], select, input[type="file"] {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            margin-right: 0.5rem;
        }
        button:hover { background-color: #2980b9; }
        button.success { background-color: #2ecc71; }
        button.success:hover { background-color: #27ae60; }
        #log {
            background: #2c3e50;
            color: #ecf0f1;
            padding: 1rem;
            border-radius: 4px;
            white-space: pre-wrap;
            min-height: 50px;
        }
        .action-panel {
            background: #f8f9fa;
            padding: 1rem;
            border: 1px solid #e9ecef;
            border-radius: 4px;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>XML Hanterare</h1>
        
        <div class="form-group">
            <label for="fileInput">1. Importera XML-fil</label>
            <input type="file" id="fileInput" accept=".xml">
        </div>

        <div id="workspace" class="hidden">
            <div class="form-group">
                <label for="actionSelect">2. Välj funktion att köra</label>
                <select id="actionSelect">
                    <option value="change_paths">Ändra filvägar (Find & Replace)</option>
                    </select>
            </div>

            <div id="ui_change_paths" class="action-panel">
                <div class="form-group">
                    <label>Sök efter (t.ex. C:\Gamla\Projekt\)</label>
                    <input type="text" id="oldPath">
                </div>
                <div class="form-group">
                    <label>Ersätt med (t.ex. /Volumes/Mac/Projekt/)</label>
                    <input type="text" id="newPath">
                </div>
            </div>

            <div class="form-group">
                <button id="applyBtn">Verkställ ändring</button>
            </div>

            <hr>

            <div class="form-group">
                <label>3. Spara resultatet</label>
                <button id="downloadBtn" class="success">Ladda ner modifierad XML</button>
            </div>
        </div>
    </div>

    <div class="card">
        <label>Systemlogg:</label>
        <div id="log">Väntar på fil...</div>
    </div>

    <script>
        // -- STATE MANAGEMENT --
        // Här sparar vi XML-dokumentet så att vi kan göra flera ändringar i rad
        let currentXmlDoc = null;
        let originalFileName = "edited.xml";

        // -- UI ELEMENT --
        const fileInput = document.getElementById('fileInput');
        const workspace = document.getElementById('workspace');
        const actionSelect = document.getElementById('actionSelect');
        const applyBtn = document.getElementById('applyBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const logArea = document.getElementById('log');

        // -- HJÄLPFUNKTIONER --
        function log(msg) {
            const time = new Date().toLocaleTimeString();
            logArea.innerHTML += `\n[${time}] ${msg}`;
            logArea.scrollTop = logArea.scrollHeight;
        }

        // Byt UI beroende på vald action
        actionSelect.addEventListener('change', (e) => {
            // Göm alla paneler
            document.querySelectorAll('.action-panel').forEach(panel => panel.classList.add('hidden'));
            // Visa vald panel
            const selectedPanel = document.getElementById(`ui_${e.target.value}`);
            if(selectedPanel) selectedPanel.classList.remove('hidden');
        });

        // -- STEG 1: LADDA IN XML --
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            originalFileName = file.name;
            const reader = new FileReader();
            
            reader.onload = function(event) {
                const xmlString = event.target.result;
                const parser = new DOMParser();
                currentXmlDoc = parser.parseFromString(xmlString, "text/xml");
                
                // Felhantering om XML:en är trasig
                const parseError = currentXmlDoc.getElementsByTagName("parsererror");
                if (parseError.length > 0) {
                    log("FEL: Kunde inte läsa XML-filen. Är den korrupt?");
                    return;
                }

                workspace.classList.remove('hidden');
                logArea.innerHTML = `Laddade in: ${file.name}`;
                log("XML lagrad i minnet. Redo för modifiering.");
            };
            
            reader.readAsText(file);
        });

        // -- STEG 2: KÖR VALD FUNKTION --
        applyBtn.addEventListener('click', () => {
            if (!currentXmlDoc) {
                log("FEL: Ingen XML är laddad.");
                return;
            }

            const action = actionSelect.value;

            // Enkel routing till rätt funktion
            if (action === "change_paths") {
                executeChangePaths();
            } 
            // LÄGG TILL DIN NÄSTA FUNKTION HÄR:
            // else if (action === "my_new_function") {
            //     executeMyNewFunction();
            // }
        });

        // --- SKRIPT/MODULER ---

        // Skript 1: Ändra filvägar
        function executeChangePaths() {
            const oldStr = document.getElementById('oldPath').value;
            const newStr = document.getElementById('newPath').value;

            if(!oldStr) {
                log("Varning: Du måste skriva in något att söka efter.");
                return;
            }

            // Eftersom Premiere/DaVinci använder olika taggar (<pathurl>, <filepath>, textnoder)
            // går vi igenom ALLA textnoder i hela dokumentet och gör en "sök och ersätt".
            // Detta är säkrare än Regex eftersom det inte riskerar att förstöra XML-strukturen.
            const walker = document.createTreeWalker(currentXmlDoc, NodeFilter.SHOW_TEXT, null, false);
            let node;
            let count = 0;

            while (node = walker.nextNode()) {
                if (node.nodeValue.includes(oldStr)) {
                    node.nodeValue = node.nodeValue.split(oldStr).join(newStr);
                    count++;
                }
            }

            log(`Klart! Ändrade filvägar på ${count} ställen i dokumentet.`);
        }

        // -- STEG 3: LADDA NER --
        downloadBtn.addEventListener('click', () => {
            if (!currentXmlDoc) return;

            // Konvertera tillbaka DOM-objektet till en XML-sträng
            const serializer = new XMLSerializer();
            const xmlString = serializer.serializeToString(currentXmlDoc);

            // Skapa en nedladdningsbar fil (Blob)
            const blob = new Blob([xmlString], { type: "text/xml" });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement("a");
            a.href = url;
            a.download = "MODIFIERAD_" + originalFileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url); // Städa upp i minnet

            log(`Laddade ner modifierad fil som: MODIFIERAD_${originalFileName}`);
        });

    </script>
</body>
</html>
